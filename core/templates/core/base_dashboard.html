{% extends "core/base.html" %}
{% block nav_links %}
<div class="user-nav-wrapper">
    <div class="user-profile">
        <span class="user-welcome">Welcome, <strong>{{ user.first_name|default:"Guest User" }}</strong></span>
    </div>
    <form action="{% url 'logout' %}" method="post" style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="btn-logout">
            Logout
        </button>
    </form>
</div>
{% endblock %}
{% block content %}
<div class="app-layout">

    <!-- Sidebar Container -->
    <aside class="sidebar">
        <h3>Menu</h3>
        <a href="{% url 'dashboard-home' %}" 
           class="sidebar-link {% if request.resolver_match.url_name == 'dashboard-home' %}active{% endif %}">
            <i data-lucide="layout-dashboard"></i>
            Overview
        </a>
        <a href="{% url 'dashboard-customers' %}" 
           class="sidebar-link {% if request.resolver_match.url_name == 'dashboard-customers' %}active{% endif %}">
            <i data-lucide="users"></i>
            My Customers
        </a>
    </aside>

    <!-- Main Content Work Area -->
    <main class="main-content {% block dashboard_main_class %}{% endblock %}">
        {% block dashboard_content %}{% endblock %}
    </main>

</div>
{% endblock %}

{% block extra_css %}
<style>
    /* Layout Framework & Sidebar Positioning */
    .app-layout {
        display: flex;
        gap: 2rem;
        width: 100%;
        align-items: flex-start;
    }

    .sidebar {
        width: 240px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem 1rem;
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        flex-shrink: 0;
        position: sticky;
        top: calc(44px + 3rem);
    }

    .sidebar h3 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
        padding-left: 0.75rem;
    }

    .sidebar-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.7rem 0.85rem;
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        border-radius: 0.5rem;
        transition: all 0.15s ease;
    }

    .sidebar-link svg, 
    .sidebar-link i {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
    }

    .sidebar-link:hover {
        background-color: var(--bg);
        color: var(--text-main);
    }

    .sidebar-link.active {
        background-color: #e0e7ff;
        color: var(--primary);
        font-weight: 600;
    }

    .main-content {
        flex: 1;
        min-width: 0;
    }

    /* Shared Dashboard Core Cards & Typography */
    .dashboard-header-card {
        background: var(--surface);
        padding: 2rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        margin-bottom: 2rem;
        box-shadow: var(--shadow-sm);
    }

    .dashboard-header-card h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 0.25rem;
    }

    .dashboard-header-card p {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .dashboard-card {
        background: var(--surface);
        padding: 1.5rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
    }

    .dashboard-card h3 {
        margin-bottom: 1rem;
        font-size: 1.1rem;
        color: var(--text-main);
    }

    /* Sub-component Style Hook */
    {% block dashboard_extra_css %}{% endblock %}
</style>
{% endblock %}
